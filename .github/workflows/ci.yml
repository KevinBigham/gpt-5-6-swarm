name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.9"
          - os: ubuntu-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.13"
          - os: windows-latest
            python: "3.11"
          - os: macos-latest
            python: "3.11"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      # Standard library only: no pip install step, by design.
      - name: Unit, scenario, and repository-hygiene tests
        run: python -m unittest discover -s tests -v
      - name: Replay shipped contract and benchmark examples
        run: |
          python plugins/gpt-5-6-swarm/skills/gpt-5-6-swarm/scripts/swarm_contract.py validate examples/frozen-contract.example.json
          python plugins/gpt-5-6-swarm/skills/gpt-5-6-swarm/scripts/swarm_benchmark.py validate-case examples/benchmark-case.example.json
          python plugins/gpt-5-6-swarm/skills/gpt-5-6-swarm/scripts/swarm_benchmark.py compare examples/benchmark-case.example.json examples/benchmark-serial-trial.example.json examples/benchmark-swarm-trial.example.json
          python plugins/gpt-5-6-swarm/skills/gpt-5-6-swarm/scripts/swarm_ledger.py verify-reference-set

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install development-only coverage tool
        run: python -m pip install -r requirements-dev.txt
      - name: Run ledger coverage gate
        run: |
          python -m coverage run -m unittest discover -s tests
          python -m coverage combine
          python -m coverage report
          python -m coverage xml
      - uses: actions/upload-artifact@v7
        with:
          name: ledger-coverage
          path: coverage.xml
          if-no-files-found: error
